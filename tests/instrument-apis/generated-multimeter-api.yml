api_version: 1.0.0
instrument:
  vendor: Mock
  model: 5
  identifier: Meter1
  description: Mock Voltage Meter
protocol:
  type: Custom
channel_groups:
  - name: analog
    description: Analog input channels
    channel_parameter:
      name: channel
      type: int
      min: 1
      max: 8
      description: Voltage meter channel number (1-8)
    io_types:
      - name: stream
        type: array
        role: input
        description: Voltage to set
        suffix: stream
        unit: V
      - name: voltage
        type: float
        role: input
        description: Measured DC voltage
        suffix: voltage
        unit: V
      - name: sample_rate
        type: int
        role: setting
        description: Sample rate of the channel
        suffix: sample_rate
        unit: Hz
      - name: bins
        type: int
        role: setting
        description: Number of bins to average for each data point
        suffix: bins
io:
  - name: analog1_stream
    type: array
    role: input
    description: Voltage to set
    unit: V
  - name: analog1_voltage
    type: float
